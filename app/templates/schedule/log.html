{% extends "base.html" %}
{% block title %}Schedule Shifts{% endblock %}
{% block content %}
<h2 class="mb-4">Schedule Shifts</h2>

<div class="page-card card-sky">
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3 col-md-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" required>
    </div>

    <table class="table">
        <thead>
            <tr><th>Employee</th><th>Department</th><th>Shift</th></tr>
        </thead>
        <tbody>
            {% for e in employees %}
            <tr>
                <td>{{ e.full_name }}</td>
                <td>{{ e.department or '-' }}</td>
                <td>
                    <select name="shift_{{ e.id }}" class="form-select form-select-sm">
                        <option value="">-- Not scheduled --</option>
                        <option value="opening">Opening (8:00 AM - 6:00 PM)</option>
                        <option value="closing">Closing (11:30 AM - 8:00 PM)</option>
                    </select>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button type="submit" class="btn btn-primary">Save Schedule</button>
</form>
</div>
{% endblock %}
