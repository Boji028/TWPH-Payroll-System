{% extends "base.html" %}
{% block title %}Log Attendance{% endblock %}
{% block content %}
<h2 class="mb-4">Log Attendance</h2>

<div class="page-card card-sky">
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3 col-md-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" required>
    </div>

    <table class="table">
        <thead>
            <tr><th>Employee</th><th>Pay Type</th><th>Status</th><th>Hours Worked</th></tr>
        </thead>
        <tbody>
            {% for e in employees %}
            <tr>
                <td>{{ e.full_name }}</td>
                <td>{{ e.pay_type }}</td>
                <td>
                    <select name="status_{{ e.id }}" class="form-select form-select-sm">
                        <option value="present">Present</option>
                        <option value="late">Late</option>
                        <option value="absent">Absent</option>
                        <option value="leave">Leave</option>
                        <option value="holiday">Holiday</option>
                    </select>
                </td>
                <td>
                    <input type="number" step="0.5" name="hours_{{ e.id }}" class="form-control form-control-sm" placeholder="e.g. 8">
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button type="submit" class="btn btn-primary">Save Attendance</button>
</form>
</div>
{% endblock %}
